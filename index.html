<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Memory Game</title>
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center">
        <!-- Header Section -->
        <header class="headline">
            <div class="divIcon">
                <img class="icon" height="50px" src="assets/memory-game.png" alt="Memory Game Icon">
            </div>
            <h1>Memory Game</h1>
        </header>

        <!-- Rank Board -->
        <section class="rank" style="display: none;"></section>

        <!-- Game Board -->
        <main id="game-board" class="board d-flex"></main>

        <!-- Game Info Section -->
        <section id="info" class="info-container">
            <div id="timer">Time: 0s</div>
            <div id="lives">
                <img height="50px" src="assets/heart.png" alt="Heart">
                <img height="50px" src="assets/heart.png" alt="Heart">
                <img height="50px" src="assets/heart.png" alt="Heart">
                <img height="50px" src="assets/heart.png" alt="Heart">
            </div>
        </section>

        <!-- Level Buttons Section -->
        <section class="level-buttons">
            <button id="restart-btn" class="btn">Restart</button>
            <button id="restart-hard-btn" class="btn level-btn">Hard</button>
            <button id="restart-easy-btn" class="btn level-btn">Easy</button>
            <button id="show-rank-board" class="btn">Show Rank Board</button>
        </section>

        <!-- Blur Background and Message -->
        <div class="blur-background" id="blur-background" style="display: none;">
            <div class="message-container" id="message-container"></div>
        </div>
    </div>

    <script defer src="app.js"></script>
</body>
</html>
